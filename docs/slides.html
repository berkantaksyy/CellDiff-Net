<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slides — CellDiff-Net</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1a1a;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: #111;
      border-bottom: 1px solid #333;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar .left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .back-link {
      font-size: 0.82rem;
      color: #aaa;
      text-decoration: none;
      white-space: nowrap;
    }
    .back-link:hover { color: #fff; }
    .title-block { min-width: 0; }
    .title-block .slide-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #eee;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title-block .slide-sub {
      font-size: 0.74rem;
      color: #777;
    }
    .topbar .right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-light { background: #fff; color: #111; border-color: #fff; }
    .btn-light:hover { background: #eee; }
    .btn-ghost { background: transparent; color: #aaa; border-color: #444; }
    .btn-ghost:hover { background: #222; color: #fff; border-color: #666; }
    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── PDF FRAME ── */
    .viewer {
      flex: 1;
      min-height: 0;
      position: relative;
    }
    .viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .fallback {
      display: none;
      position: absolute;
      inset: 0;
      background: #1a1a1a;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    .fallback p { font-size: 0.9rem; color: #aaa; max-width: 420px; }
    .fallback a { color: #7baff5; }

    @media (max-width: 560px) {
      .title-block .slide-sub { display: none; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="left">
    <a class="back-link" href="/">← Back</a>
    <div class="divider" style="width:1px;height:20px;background:#333;flex-shrink:0;"></div>
    <div class="title-block">
      <div class="slide-title">ML-Based Identification of Stem Cell Differentiation States</div>
      <div class="slide-sub">BME418 · Berkant Aksoy · Elif Burak · Sarya Rojin Gönüldaş</div>
    </div>
  </div>
  <div class="right">
    <a class="btn btn-ghost" href="https://view.officeapps.live.com/op/view.aspx?src=https%3A%2F%2Fraw.githubusercontent.com%2Fberkantaksyy%2FCellDiff-Net%2Fmain%2Fslides%2FStemCell_DL_LiteratureReview.pptx" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      PPTX
    </a>
    <a class="btn btn-light" href="assets/StemCell_DL_presentation.pdf" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PDF
    </a>
  </div>
</div>

<!-- VIEWER -->
<div class="viewer">
  <iframe
    id="pdfframe"
    src="assets/StemCell_DL_presentation.pdf"
    title="CellDiff-Net Presentation Slides"
  ></iframe>
  <div class="fallback" id="fallback">
    <p>Your browser couldn't display the PDF inline. You can open or download it directly:</p>
    <a class="btn btn-light" href="assets/StemCell_DL_presentation.pdf" target="_blank">Open PDF</a>
  </div>
</div>

<script>
  // If iframe fails to load the PDF, show the fallback
  const frame = document.getElementById('pdfframe');
  const fallback = document.getElementById('fallback');
  frame.addEventListener('error', () => {
    frame.style.display = 'none';
    fallback.style.display = 'flex';
  });
</script>

</body>
</html>
